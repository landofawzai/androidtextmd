<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>Markdown Editor</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">MD Editor</h1>
    <div class="header-actions">
      <button id="layout-toggle" class="btn btn-ghost btn-icon" title="Toggle layout" aria-label="Toggle layout">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      </button>
      <button id="install-btn" class="btn btn-ghost" hidden>Install</button>
      <div class="action-cluster">
        <button id="copy-btn" class="btn btn-ghost">Copy</button>
        <button id="clear-btn" class="btn btn-ghost">Clear</button>
        <button id="export-html-btn" class="btn btn-ghost">Export HTML</button>
        <button id="save-btn" class="btn btn-primary">Save .md</button>
      </div>
      <button id="overflow-btn" class="btn btn-ghost btn-icon overflow-toggle" aria-label="More actions" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>
  </header>

  <nav class="mobile-tabs" role="tablist">
    <button class="tab tab-active" data-pane="edit" role="tab" aria-selected="true">Edit</button>
    <button class="tab" data-pane="preview" role="tab" aria-selected="false">Preview</button>
  </nav>

  <main class="workspace">
    <section class="pane pane-editor" data-pane="edit">
      <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" placeholder="Paste or type markdown here…"></textarea>
    </section>
    <section class="pane pane-preview" data-pane="preview">
      <article id="preview" class="preview"></article>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="/vendor/purify.min.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
